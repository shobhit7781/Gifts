// ---- Supabase helpers ----
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  // 200, 201, 204 are all success
  if (res.status >= 200 && res.status < 300) {
    if (res.status === 204 || res.headers.get('content-length') === '0') return null;
    try { return await res.json(); } catch(e) { return null; }
  }
  throw new Error('HTTP ' + res.status);
}

    if (!Array.isArray(rows)) return;
    claims = {};
    rows.forEach(r => { claims[r.item_name] = r.claimer || ''; });
    renderAll();
  } catch(e) { /* silent fail on poll errors */ }
}

async function saveClaim(name, claimer) {
  if (!isConfigured) return;
  await sbFetch('claims?on_conflict=item_name', {
    method: 'POST',
    prefer: 'resolution=merge-duplicates,return=minimal',
    body: { item_name: name, claimer: claimer || '' }
  });
}

async function deleteClaim(name) {
  if (!isConfigured) return;
  await sbFetch('claims?item_name=eq.' + encodeURIComponent(name), { method: 'DELETE' });
}

// ---- Toast ----
function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ---- Prevent double-claims ----
let claiming = false;

// ---- Claim / unclaim ----
async function claim(idx) {
  if (claiming) return;
  claiming = true;
  const item = items[idx];
  const nameEl = document.getElementById('claimer-' + idx);
  const claimer = nameEl ? nameEl.value.trim() : '';
  const btn = document.querySelector('#card-' + idx + ' .tick-btn');
  if (btn) btn.disabled = true;
  try {
    if (isConfigured) await saveClaim(item.name, claimer);
    claims[item.name] = claimer;
    hardRenderAll();
    showToast(claimer ? claimer + ' is on it! 🎀' : 'Claimed! 🎀');
  } catch(e) {
    showToast('Something went wrong, try again');
    if (btn) btn.disabled = false;
  } finally {
    claiming = false;
  }
}

async function unclaim(idx) {
  const item = items[idx];
  try {
    if (isConfigured) await deleteClaim(item.name);
    delete claims[item.name];
    hardRenderAll();
    showToast('Unclaimed!');
  } catch(e) { showToast('Something went wrong, try again'); }
}

// ---- Smart render: only replace cards whose claim state changed ----
function renderAll() {
  const grid = document.getElementById('grid');
  if (!grid.querySelector('.card')) { hardRenderAll(); return; }
  items.forEach((item, idx) => {
    const existing = document.getElementById('card-' + idx);
    if (!existing) return;
    const isClaimed = item.name in claims;
    const wasClaimed = existing.classList.contains('claimed');
    if (isClaimed === wasClaimed) return; // no change, leave it alone
    grid.replaceChild(buildCard(item, idx), existing);
  });
}

// ---- Full rebuild (only on load + after claim/unclaim) ----
function hardRenderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach((item, idx) => grid.appendChild(buildCard(item, idx)));
}

// ---- Build card ----
function buildCard(item, idx) {
  const isClaimed = item.name in claims;
  const claimer = claims[item.name] || '';
  const card = document.createElement('div');
  card.className = 'card' + (isClaimed ? ' claimed' : '');
  card.id = 'card-' + idx;
  card.style.animationDelay = (idx * 0.06) + 's';

  let badgeHtml = isClaimed
    ? `<div class="card-badge badge-claimed">✓ claimed</div>`
    : item.type === 'ref'
      ? `<div class="card-badge badge-ref">reference</div>`
      : `<div class="card-badge badge-link">direct link</div>`;

  let imgHtml = '';
  if (item.type === 'link' && item.img) {
    imgHtml = `<div class="img-wrap"><img src="${item.img}" alt="${item.name}" loading="lazy" /></div>`;
  } else if (item.type === 'ref' && item.refs && item.refs.length) {
    const refs = item.refs.slice(0,4);
    imgHtml = refs.length === 1
      ? `<div class="img-wrap"><img src="${refs[0]}" alt="${item.name}" loading="lazy" /></div>`
      : `<div class="img-wrap"><div class="ref-grid">${refs.map(r=>`<img src="${r}" alt="" loading="lazy"/>`).join('')}</div></div>`;
  } else {
    imgHtml = `<div class="img-wrap"><div class="no-img">🎁</div></div>`;
  }

  const actionHtml = item.type === 'link' && item.url
    ? `<a class="link-btn" href="${item.url}" target="_blank">🔗 View item</a>`
    : `<div class="ref-note">🔎 Find something similar</div>`;

  let claimHtml = '';
  if (isClaimed) {
    const who = claimer ? ` — ${claimer}` : '';
    claimHtml = `<div class="claim-area"><div class="claimed-tag">✓ on it${who}<button class="undo-btn" onclick="unclaim(${idx})" style="margin-left:6px;">undo</button></div></div>`;
  } else {
    claimHtml = `<div class="claim-area"><div class="claim-row">
      <button class="tick-btn" onclick="claim(${idx})" title="I'm getting this!">🎀</button>
      <input class="claimer-input" type="text" id="claimer-${idx}" placeholder="your name (optional)" onkeydown="if(event.key==='Enter')claim(${idx})" />
    </div></div>`;
  }

  card.innerHTML = `${badgeHtml}${imgHtml}<div class="card-body"><div class="item-name">${item.name}</div>${item.note?`<div class="item-note">${item.note}</div>`:''}${actionHtml}${claimHtml}</div>`;
  return card;
}

// ---- Modal ----
let itemType = 'link';
function setType(t) {
  itemType = t;
  document.getElementById('tb-link').classList.toggle('active', t==='link');
  document.getElementById('tb-ref').classList.toggle('active', t==='ref');
  document.getElementById('link-fields').style.display = t==='link' ? '' : 'none';
  document.getElementById('ref-fields').style.display = t==='ref' ? '' : 'none';
}
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['m-name','m-note','m-url','m-img','m-refs'].forEach(id => document.getElementById(id).value='');
  setType('link');
}
function addItem() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Please enter an item name!'); return; }
  const note = document.getElementById('m-note').value.trim();
  if (itemType === 'link') {
    items.push({ name, note, type:'link', url: document.getElementById('m-url').value.trim(), img: document.getElementById('m-img').value.trim() });
  } else {
    const refs = document.getElementById('m-refs').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
    items.push({ name, note, type:'ref', refs });
  }
  closeModal();
  renderAll();
}
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });

// ---- Init ----
hardRenderAll();
if (isConfigured) {
  loadClaims();
  // poll every 30 seconds, but skip if user is typing
  setInterval(() => {
    if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) return;
    loadClaims();
  }, 30000);
} else {
  showToast('Add your Supabase keys to enable live sync', 4000);
}
</script>
</body>
