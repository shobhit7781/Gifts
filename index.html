<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Juree's 25th Birthday Gifts List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #fdf6ee;
    --warm-white: #fffaf5;
    --rose: #e8836a;
    --deep-rose: #c45e47;
    --plum: #7a3f5a;
    --deep-plum: #4d2240;
    --gold: #d4a843;
    --gold-light: #f0d080;
    --text: #2a1520;
    --text-muted: #7a5a65;
    --card-bg: #fffcf8;
    --border: rgba(212,168,67,0.25);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(242,196,176,0.35) 0%, transparent 45%),
      radial-gradient(circle at 85% 70%, rgba(122,63,90,0.15) 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(212,168,67,0.08) 0%, transparent 60%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.18;
    background-image: radial-gradient(circle, var(--rose) 1.5px, transparent 1.5px), radial-gradient(circle, var(--gold) 1px, transparent 1px), radial-gradient(circle, var(--plum) 1px, transparent 1px);
    background-size: 180px 180px, 120px 120px, 200px 200px;
    background-position: 30px 30px, 90px 60px, 150px 10px;
  }
  .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--deep-plum); color: var(--gold-light);
    padding: 0.65rem 1.25rem; border-radius: 30px;
    font-size: 0.85rem; font-weight: 500;
    transition: transform 0.3s ease; z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* HEADER */
  header { text-align: center; padding: 3.5rem 1rem 2.5rem; }
  .header-ribbon { display: inline-block; font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--deep-rose); letter-spacing: 0.08em; background: linear-gradient(90deg, transparent, rgba(232,131,106,0.12), transparent); padding: 0.25rem 2rem; margin-bottom: 0.75rem; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 7vw, 4.2rem); font-weight: 900; line-height: 1.15; color: var(--deep-plum); display: inline-block; }
  h1 em { font-style: italic; color: var(--rose); position: relative; }
  h1 em::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--rose)); border-radius: 2px; }
  .h1-accent { display: inline; font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 7vw, 4.2rem); font-weight: 900; font-style: italic; color: var(--gold); }
  .subtitle { font-family: 'Caveat', cursive; font-size: clamp(1.3rem, 4vw, 1.8rem); color: var(--plum); margin-top: 1rem; line-height: 1.4; }
  .header-divider { margin: 1.5rem auto 0; width: 160px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .header-emoji { font-size: 2rem; display: block; margin-bottom: 0.5rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  /* LEGEND */
  .legend { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin: 2rem 0 2.5rem; font-size: 0.8rem; color: var(--text-muted); }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-ref { background: var(--plum); }
  .dot-link { background: var(--rose); }
  .dot-claimed { background: #5a9e6f; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem; }

  /* CARD */
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; position: relative; transition: transform 0.22s, box-shadow 0.22s; animation: cardIn 0.4s ease both; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 14px 40px rgba(77,34,64,0.13); }
  .card.claimed { border-color: rgba(90,158,111,0.4); background: #f5fcf7; }
  .card.claimed:hover { transform: translateY(-2px); }
  @keyframes cardIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .card-badge { position: absolute; top: 10px; left: 10px; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; z-index: 2; }
  .badge-ref { background: rgba(77,34,64,0.75); color: #f0d080; }
  .badge-link { background: rgba(232,131,106,0.85); color: #fff; }
  .badge-claimed { background: rgba(90,158,111,0.85); color: #fff; }

  .img-wrap { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #f5ede5; position: relative; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
  .card:hover .img-wrap img { transform: scale(1.04); }
  .ref-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 100%; height: 100%; }
  .ref-grid img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

  .card-body { padding: 12px 14px 14px; }
  .item-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--deep-plum); margin-bottom: 3px; }
  .item-note { font-size: 0.75rem; color: var(--text-muted); line-height: 1.45; margin-bottom: 10px; font-style: italic; }
  .link-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 0.75rem; font-weight: 500; color: var(--deep-rose); text-decoration: none; border: 0.5px solid rgba(196,94,71,0.35); padding: 4px 10px; border-radius: 20px; transition: background 0.15s; margin-bottom: 10px; }
  .link-btn:hover { background: rgba(196,94,71,0.08); }
  .ref-note { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 10px; font-style: italic; }

  /* CLAIM */
  .claim-area { border-top: 1px solid rgba(212,168,67,0.2); padding-top: 10px; }
  .claim-row { display: flex; align-items: center; gap: 8px; }
  .tick-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid rgba(122,63,90,0.35); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.18s; font-size: 14px; }
  .tick-btn:hover { border-color: var(--rose); background: rgba(232,131,106,0.1); }
  .tick-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .claimer-input { flex: 1; font-size: 0.75rem; border: 0.5px solid rgba(122,63,90,0.2); border-radius: 20px; padding: 5px 11px; background: rgba(253,246,238,0.8); color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
  .claimer-input:focus { border-color: var(--rose); }
  .claimer-input::placeholder { color: var(--text-muted); font-style: italic; }
  .claimed-tag { font-family: 'Caveat', cursive; font-size: 1rem; color: #4a8860; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .undo-btn { background: none; border: none; cursor: pointer; font-size: 0.7rem; color: #888; font-family: 'DM Sans', sans-serif; padding: 0; text-decoration: underline; }
  .loading-dots::after { content: '...'; animation: dots 1s steps(3,end) infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

  /* ADD CARD */
  .add-card { border: 1.5px dashed rgba(212,168,67,0.45); border-radius: 18px; background: rgba(253,246,238,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: background 0.2s, border-color 0.2s; min-height: 220px; color: var(--text-muted); font-size: 0.85rem; }
  .add-card:hover { background: rgba(232,131,106,0.07); border-color: var(--rose); color: var(--deep-rose); }
  .add-card-icon { font-size: 2rem; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(40,10,25,0.55); z-index: 200; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--warm-white); border-radius: 20px; padding: 1.75rem; width: min(480px, 100%); max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--deep-plum); margin-bottom: 1.25rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
  .field input, .field textarea { width: 100%; font-size: 0.9rem; border: 1px solid rgba(122,63,90,0.2); border-radius: 10px; padding: 9px 13px; background: var(--cream); color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
  .field input:focus, .field textarea:focus { border-color: var(--rose); }
  .field textarea { resize: vertical; min-height: 72px; }
  .type-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .type-btn { flex: 1; font-size: 0.8rem; padding: 8px; border-radius: 10px; border: 1px solid rgba(122,63,90,0.2); background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .type-btn.active { background: var(--deep-plum); border-color: var(--deep-plum); color: var(--gold-light); font-weight: 500; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1rem; }
  .btn-cancel { font-size: 0.85rem; padding: 9px 20px; border-radius: 10px; border: 1px solid rgba(122,63,90,0.2); background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-save { font-size: 0.85rem; padding: 9px 22px; border-radius: 10px; border: none; background: var(--deep-plum); color: var(--gold-light); cursor: pointer; font-weight: 500; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .btn-save:hover { background: var(--plum); }

  footer { text-align: center; padding: 2.5rem 0 1rem; font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--text-muted); }

  @media (max-width: 600px) {
    .page { padding: 1rem 0.85rem 3rem; }
    header { padding: 2rem 0.5rem 1.5rem; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .card-body { padding: 8px 9px 10px; }
    .item-name { font-size: 0.88rem; }
    .item-note { font-size: 0.7rem; margin-bottom: 7px; }
    .link-btn { font-size: 0.7rem; padding: 3px 8px; }
    .ref-note { font-size: 0.68rem; }
    .claimer-input { font-size: 0.7rem; padding: 4px 9px; }
    .tick-btn { width: 24px; height: 24px; font-size: 12px; }
    .legend { gap: 0.75rem; font-size: 0.72rem; flex-direction: column; align-items: center; }
    .modal { padding: 1.25rem; border-radius: 16px; }
    .card-badge { font-size: 8px; padding: 2px 7px; }
    .subtitle { font-size: clamp(1.1rem, 5vw, 1.5rem); }
  }
  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    h1 { font-size: clamp(1.9rem, 9vw, 2.4rem); }
    .h1-accent { font-size: clamp(1.9rem, 9vw, 2.4rem); }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <span class="header-emoji">🎂</span>
    <div class="header-ribbon">✦ a very important document ✦</div>
    <h1>Juree's <em>25th</em> Birthday<br><span class="h1-accent">Gifts List</span></h1>
    <p class="subtitle">no pressure, but also... yes pressure 🎀</p>
    <div class="header-divider"></div>
  </header>

  <div class="legend">
    <span><span class="legend-dot dot-ref"></span> Reference — find something similar</span>
    <span><span class="legend-dot dot-link"></span> Direct link — exact item</span>
    <span><span class="legend-dot dot-claimed"></span> Already being gifted</span>
  </div>

  <div class="grid" id="grid"></div>
  <footer>made with love (and strategic planning) 💛</footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Add a gift ✨</div>
    <div class="field"><label>Item name *</label><input type="text" id="m-name" placeholder="e.g. Layered necklace set" /></div>
    <div class="field"><label>Note (optional)</label><input type="text" id="m-note" placeholder="e.g. Gold tone, dainty chains" /></div>
    <div class="field"><label>Type</label></div>
    <div class="type-toggle">
      <button class="type-btn active" id="tb-link" onclick="setType('link')">🔗 Direct link</button>
      <button class="type-btn" id="tb-ref" onclick="setType('ref')">🖼 Reference / vibe</button>
    </div>
    <div id="link-fields">
      <div class="field"><label>Product URL</label><input type="url" id="m-url" placeholder="https://..." /></div>
      <div class="field"><label>Image URL</label><input type="url" id="m-img" placeholder="https://..." /></div>
    </div>
    <div id="ref-fields" style="display:none">
      <div class="field"><label>Reference image URLs (one per line, up to 4)</label><textarea id="m-refs" placeholder="https://image1.com&#10;https://image2.com"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addItem()">Add to list</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
//  STEP 1: PASTE YOUR SUPABASE KEYS HERE
// ============================================================
const SUPABASE_URL = 'https://qymwneiaejktdkywfmih.supabase.co';
const SUPABASE_KEY = 'sb_publishable_lS2pDLkLnBYtj6uMOWKDAA_GSDEhh0M';
// ============================================================

const items = [
  { name: "Mini bag / purse", note: "Evening bag — structured, bow-shaped, or crescent", type: "ref",
    refs: ["https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=300&q=80","https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=300&q=80","https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300&q=80","https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d?w=300&q=80"] },
  { name: "Perfume", note: "Floral or musky — Maison Margiela Replica vibes", type: "ref",
    refs: ["https://images.unsplash.com/photo-1594035910387-fea47794261f?w=300&q=80","https://images.unsplash.com/photo-1541643600914-78b084683702?w=300&q=80","https://images.unsplash.com/photo-1615634260167-c8cdede054de?w=300&q=80"] },
  { name: "Maxi skirt", note: "Flowy, earthy tones — use refs to find something similar", type: "ref",
    refs: ["https://images.unsplash.com/photo-1583496661160-fb5886a773d3?w=300&q=80","https://images.unsplash.com/photo-1576995853123-5a10305d93c0?w=300&q=80","https://images.unsplash.com/photo-1604654894610-df63bc536371?w=300&q=80"] },
  { name: "Kindle Paperwhite", note: "11th gen or newer, any color", type: "link",
    url: "https://www.amazon.in/dp/B09TMF6742", img: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&q=80" },
  { name: "Layered necklace set", note: "Gold tone, dainty chains — 2 or 3 layers", type: "ref",
    refs: ["https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=300&q=80","https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=300&q=80","https://images.unsplash.com/photo-1610694955371-d4a3e0ce4b52?w=300&q=80"] },
  { name: "Polaroid camera", note: "Instax Mini 12 — pastel color please!", type: "link",
    url: "https://www.amazon.in/s?k=instax+mini+12", img: "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400&q=80" },
  { name: "Scented candle", note: "Warm cozy scent — vanilla, amber, or sandalwood", type: "ref",
    refs: ["https://images.unsplash.com/photo-1603006905003-be475563bc59?w=300&q=80","https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=300&q=80","https://images.unsplash.com/photo-1608181831718-c9fcc0ade777?w=300&q=80"] },
  { name: "Book", note: "Normal People by Sally Rooney — or Intermezzo", type: "link",
    url: "https://www.amazon.in/s?k=normal+people+sally+rooney", img: "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=400&q=80" },
];

// claims loaded from Supabase: { item_name: claimer_string }
let claims = {};
const isConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL';

// ---- Supabase helpers ----
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  // 200, 201, 204 are all success
  if (res.status >= 200 && res.status < 300) {
    if (res.status === 204 || res.headers.get('content-length') === '0') return null;
    try { return await res.json(); } catch(e) { return null; }
  }
  throw new Error('HTTP ' + res.status);
}

async function loadClaims() {
  if (!isConfigured) return;
  try {
    const rows = await sbFetch('claims?select=item_name,claimer');
    if (!Array.isArray(rows)) return;
    claims = {};
    rows.forEach(r => { claims[r.item_name] = r.claimer || ''; });
    renderAll();
  } catch(e) { /* silent fail on poll errors */ }
}

async function saveClaim(name, claimer) {
  if (!isConfigured) return;
  await sbFetch('claims?on_conflict=item_name', {
    method: 'POST',
    prefer: 'resolution=merge-duplicates,return=minimal',
    body: { item_name: name, claimer: claimer || '' }
  });
}

async function deleteClaim(name) {
  if (!isConfigured) return;
  await sbFetch('claims?item_name=eq.' + encodeURIComponent(name), { method: 'DELETE' });
}

// ---- Toast ----
function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ---- Prevent double-claims ----
let claiming = false;

// ---- Claim / unclaim ----
async function claim(idx) {
  if (claiming) return;
  claiming = true;
  const item = items[idx];
  const nameEl = document.getElementById('claimer-' + idx);
  const claimer = nameEl ? nameEl.value.trim() : '';
  const btn = document.querySelector('#card-' + idx + ' .tick-btn');
  if (btn) btn.disabled = true;
  try {
    if (isConfigured) await saveClaim(item.name, claimer);
    claims[item.name] = claimer;
    hardRenderAll();
    showToast(claimer ? claimer + ' is on it! 🎀' : 'Claimed! 🎀');
  } catch(e) {
    showToast('Something went wrong, try again');
    if (btn) btn.disabled = false;
  } finally {
    claiming = false;
  }
}

async function unclaim(idx) {
  const item = items[idx];
  try {
    if (isConfigured) await deleteClaim(item.name);
    delete claims[item.name];
    hardRenderAll();
    showToast('Unclaimed!');
  } catch(e) { showToast('Something went wrong, try again'); }
}

// ---- Smart render: only replace cards whose claim state changed ----
function renderAll() {
  const grid = document.getElementById('grid');
  if (!grid.querySelector('.card')) { hardRenderAll(); return; }
  items.forEach((item, idx) => {
    const existing = document.getElementById('card-' + idx);
    if (!existing) return;
    const isClaimed = item.name in claims;
    const wasClaimed = existing.classList.contains('claimed');
    if (isClaimed === wasClaimed) return; // no change, leave it alone
    grid.replaceChild(buildCard(item, idx), existing);
  });
}

// ---- Full rebuild (only on load + after claim/unclaim) ----
function hardRenderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach((item, idx) => grid.appendChild(buildCard(item, idx)));
  const addBtn = document.createElement('div');
  addBtn.className = 'add-card';
  addBtn.onclick = openModal;
  addBtn.innerHTML = '<span class="add-card-icon">+</span><span>Add a gift</span>';
  grid.appendChild(addBtn);
}

// ---- Build card ----
function buildCard(item, idx) {
  const isClaimed = item.name in claims;
  const claimer = claims[item.name] || '';
  const card = document.createElement('div');
  card.className = 'card' + (isClaimed ? ' claimed' : '');
  card.id = 'card-' + idx;
  card.style.animationDelay = (idx * 0.06) + 's';

  let badgeHtml = isClaimed
    ? `<div class="card-badge badge-claimed">✓ claimed</div>`
    : item.type === 'ref'
      ? `<div class="card-badge badge-ref">reference</div>`
      : `<div class="card-badge badge-link">direct link</div>`;

  let imgHtml = '';
  if (item.type === 'link' && item.img) {
    imgHtml = `<div class="img-wrap"><img src="${item.img}" alt="${item.name}" loading="lazy" /></div>`;
  } else if (item.type === 'ref' && item.refs && item.refs.length) {
    const refs = item.refs.slice(0,4);
    imgHtml = refs.length === 1
      ? `<div class="img-wrap"><img src="${refs[0]}" alt="${item.name}" loading="lazy" /></div>`
      : `<div class="img-wrap"><div class="ref-grid">${refs.map(r=>`<img src="${r}" alt="" loading="lazy"/>`).join('')}</div></div>`;
  } else {
    imgHtml = `<div class="img-wrap"><div class="no-img">🎁</div></div>`;
  }

  const actionHtml = item.type === 'link' && item.url
    ? `<a class="link-btn" href="${item.url}" target="_blank">🔗 View item</a>`
    : `<div class="ref-note">🔎 Find something similar</div>`;

  let claimHtml = '';
  if (isClaimed) {
    const who = claimer ? ` — ${claimer}` : '';
    claimHtml = `<div class="claim-area"><div class="claimed-tag">✓ on it${who}<button class="undo-btn" onclick="unclaim(${idx})" style="margin-left:6px;">undo</button></div></div>`;
  } else {
    claimHtml = `<div class="claim-area"><div class="claim-row">
      <button class="tick-btn" onclick="claim(${idx})" title="I'm getting this!">🎀</button>
      <input class="claimer-input" type="text" id="claimer-${idx}" placeholder="your name (optional)" onkeydown="if(event.key==='Enter')claim(${idx})" />
    </div></div>`;
  }

  card.innerHTML = `${badgeHtml}${imgHtml}<div class="card-body"><div class="item-name">${item.name}</div>${item.note?`<div class="item-note">${item.note}</div>`:''}${actionHtml}${claimHtml}</div>`;
  return card;
}

// ---- Modal ----
let itemType = 'link';
function setType(t) {
  itemType = t;
  document.getElementById('tb-link').classList.toggle('active', t==='link');
  document.getElementById('tb-ref').classList.toggle('active', t==='ref');
  document.getElementById('link-fields').style.display = t==='link' ? '' : 'none';
  document.getElementById('ref-fields').style.display = t==='ref' ? '' : 'none';
}
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['m-name','m-note','m-url','m-img','m-refs'].forEach(id => document.getElementById(id).value='');
  setType('link');
}
function addItem() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Please enter an item name!'); return; }
  const note = document.getElementById('m-note').value.trim();
  if (itemType === 'link') {
    items.push({ name, note, type:'link', url: document.getElementById('m-url').value.trim(), img: document.getElementById('m-img').value.trim() });
  } else {
    const refs = document.getElementById('m-refs').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
    items.push({ name, note, type:'ref', refs });
  }
  closeModal();
  renderAll();
}
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });

// ---- Init ----
hardRenderAll();
if (isConfigured) {
  loadClaims();
  // poll every 30 seconds, but skip if user is typing
  setInterval(() => {
    if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) return;
    loadClaims();
  }, 30000);
} else {
  showToast('Add your Supabase keys to enable live sync', 4000);
}
</script>
